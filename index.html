<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gupta Ji Archive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&family=Montserrat:wght@100;300;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #080808;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Ambient Glow Background */
        .ambient-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(212, 163, 115, 0.1) 0%, transparent 70%);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        /* 1. The Main Identity */
        .header-section {
            margin-bottom: 60px;
        }

        .name-aura {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3.5rem, 10vw, 7rem);
            font-style: italic;
            color: #d4a373;
            line-height: 0.8;
            margin-bottom: 10px;
            animation: fadeInDown 1.5s ease;
        }

        .subtitle {
            font-size: 0.6rem;
            letter-spacing: 8px;
            color: #666;
            text-transform: uppercase;
        }

        /* 2. The Voice Visualizer (Central focus) */
        .voice-box {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin: 40px 0;
        }

        .bar {
            width: 3px;
            background: #d4a373;
            border-radius: 50px;
            animation: bounce 0.8s ease-in-out infinite alternate;
        }

        @keyframes bounce {
            0% { height: 10px; opacity: 0.3; }
            100% { height: 120px; opacity: 1; box-shadow: 0 0 15px #d4a373; }
        }

        /* 3. The 3-Call Logic */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            text-align: left;
        }

        .info-card h4 {
            color: #d4a373;
            font-size: 0.7rem;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .info-card p {
            font-weight: 100;
            font-size: 0.85rem;
            color: #bbb;
            line-height: 1.4;
        }

        /* 4. The Action Button */
        .validate-btn {
            background: transparent;
            border: 1px solid #d4a373;
            color: #d4a373;
            padding: 15px 40px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 50px;
        }

        .validate-btn:hover {
            background: #d4a373;
            color: #000;
            box-shadow: 0 0 30px rgba(212, 163, 115, 0.4);
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.5rem;
            letter-spacing: 4px;
            color: #333;
        }

    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="container">
        <div class="header-section">
            <p class="subtitle">Pandey Ji Presents</p>
            <h1 class="name-aura">Naira G.</h1>
            <p class="subtitle">The Essence of Sukoon</p>
        </div>

        <div class="voice-box">
            <div class="bar" style="animation-delay: 0.1s; height: 40px;"></div>
            <div class="bar" style="animation-delay: 0.3s; height: 80px;"></div>
            <div class="bar" style="animation-delay: 0.2s; height: 100px;"></div>
            <div class="bar" style="animation-delay: 0.5s; height: 60px;"></div>
            <div class="bar" style="animation-delay: 0.4s; height: 90px;"></div>
            <div class="bar" style="animation-delay: 0.6s; height: 30px;"></div>
            <div class="bar" style="animation-delay: 0.2s; height: 70px;"></div>
        </div>

        <div class="info-grid">
            <div class="info-card">
                <h4>Voice ID</h4>
                <p>3 calls, aur har call mein wahi pyaari mithaas. Alag hi level ka sukoon.</p>
            </div>
            <div class="info-card">
                <h4>Vibe Status</h4>
                <p>Seedhi baat, no bakwas. Unfiltered aur bilkul authentic.</p>
            </div>
        </div>

        <button class="validate-btn" onclick="checkAura()">Validate Aura</button>
    </div>

    <footer>FEB 2026 / GUPTA JI COLLECTION</footer>

    <script>
        function checkAura() {
            alert("Vibe Checked: 100% Genuine. \nGupta Ji ki voice? Ekdum tezz aur pyari. ✨");
        }
    </script>

</body>
</html>
